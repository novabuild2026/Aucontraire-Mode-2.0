<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aucontraire Mode</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
        }

        /* Barre du haut */
        header{
            background:white;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px 50px;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
            position:fixed;
            width:100%;
            top:0;
            z-index:1000;
        }

        .logo{
            font-size:28px;
            font-weight:bold;
        }

        nav ul{
            display:flex;
            list-style:none;
            gap:30px;
        }

        nav a{
            text-decoration:none;
            color:black;
            font-weight:500;
        }

        nav a:hover{
            color:#777;
        }

        /* Grande bannière */
        .hero{
            height:100vh;
            background-image:url("https://images.unsplash.com/photo-1523398002811-999ca8dec234");
            background-size:cover;
            background-position:center;
            position:relative;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            color:white;
        }

        .hero::before{
            content:"";
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.35);
        }

        .hero-content{
            position:relative;
            z-index:1;
        }

        .hero h1{
            font-size:70px;
            margin-bottom:20px;
            text-transform:uppercase;
        }

        .hero p{
            font-size:24px;
            margin-bottom:30px;
        }

        .btn{
            display:inline-block;
            padding:15px 35px;
            background:white;
            color:black;
            text-decoration:none;
            border-radius:30px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn:hover{
            background:#ddd;
        }

        /* Section contenu */
        .content{
            padding:80px 50px;
            text-align:center;
        }

        .content h2{
            margin-bottom:20px;
        }

        footer{
            background:#111;
            color:white;
            text-align:center;
            padding:20px;
        }

    </style>
</head>

<body>

    <header>
        <div class="logo">Aucontraire Mode</div>

        <nav>
            <ul>
                <li><a href="#">Nouveautés</a></li>
                <li><a href="#">Homme</a></li>
                <li><a href="#">Femme</a></li>
                <li><a href="#">Enfant</a></li>
                <li><a href="#">Sport</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">

        <div class="hero-content">
            <h1>La Mode Continue</h1>
            <p>Une collection inspirée par les tendances d'aujourd'hui.</p>
            <a href="#" class="btn">Acheter</a>
        </div>

    </section>

    <section class="content">
        <h2>Bienvenue sur Aucontraire Mode</h2>
        <p>
            Découvrez nos nouvelles collections et les dernières tendances.
        </p>
    </section>

    <footer>
        Par Adrien Houtin et Tim Bosch
    </footer>

</body>

</html>
