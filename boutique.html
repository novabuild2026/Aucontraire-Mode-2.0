<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boutique - Tsogo Lingerie</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
}

/* Header */

header{
    background:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    position:fixed;
    width:100%;
    top:0;
    z-index:1000;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

nav ul{
    display:flex;
    list-style:none;
    gap:30px;
}

nav a{
    text-decoration:none;
    color:black;
}

/* Bannière */

.hero{
    margin-top:80px;
    height:45vh;
    background:url("https://images.unsplash.com/photo-1523398002811-999ca8dec234") center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-shadow:2px 2px 10px black;
}

.hero h1{
    font-size:55px;
}

/* Produits */

.articles{
    padding:70px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:40px;
}

.article{
    background:white;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    overflow:hidden;
    text-align:center;
}

.article img{
    width:100%;
    height:280px;
    object-fit:cover;
}

.article h3{
    margin:15px 0;
}

.article p{
    color:#666;
    margin-bottom:15px;
}

.article button{
    margin-bottom:20px;
    background:black;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:30px;
    cursor:pointer;
}

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}

</style>

</head>

<body>

<header>

<div class="logo">Tsogo Lingerie</div>

<nav>
<ul>
<li><a href="index.html">Accueil</a></li>
<li><a href="#">Homme</a></li>
<li><a href="#">Femme</a></li>
<li><a href="#">Enfant</a></li>
<li><a href="#">Sport</a></li>
</ul>
</nav>

</header>

<section class="hero">
<h1>Notre Boutique</h1>
</section>

<section class="articles">

<div class="article">
<img src="airforce1.jpg" alt="">
<h3>Air Force 1</h3>
<p>129 €</p>
<button>Ajouter au panier</button>
</div>

<div class="article">
<img src="airmax90.jpg" alt="">
<h3>Air Max 90</h3>
<p>149 €</p>
<button>Ajouter au panier</button>
</div>

<div class="article">
<img src="p6000.jpg" alt="">
<h3>P-6000</h3>
<p>119 €</p>
<button>Ajouter au panier</button>
</div>

<div class="article">
<img src="article4.jpg" alt="">
<h3>Nouveau modèle</h3>
<p>139 €</p>
<button>Ajouter au panier</button>
</div>

</section>

<footer>
© 2026 Tsogo Lingerie
</footer>

</body>
</html>
